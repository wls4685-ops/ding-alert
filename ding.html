<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arrival Alert</title>
</head>

<body>

<h2>학생 도착 알림</h2>

<audio id="ding" src="ding.mp3"></audio>

<iframe id="glideframe"
src="여기에_GLIDE_앱주소"
width="100%"
height="500">
</iframe>

<script>

let lastHeight = 0;

setInterval(function(){

  let frame = document.getElementById("glideframe");

  try {

    let newHeight = frame.contentWindow.document.body.scrollHeight;

    if(newHeight > lastHeight){
      document.getElementById("ding").play();
    }

    lastHeight = newHeight;

  } catch(e){}

},3000);

</script>

</body>
</html>
